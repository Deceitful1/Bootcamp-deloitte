<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/src/main/frontend/styles/style.css">
    <script src="/src/main/frontend/scripts/Login.js" defer></script>
    <title>Bootstrap demo</title>
</head>
<body>
<main>
    <div class="main-banner-container">

        <img src="/src/main/frontend/assets/main-banner.png" id="main-banner-image" alt="">

    </div>
    <div class="form-container">
        <h1 id="register-title">Login</h1>
        <form class="login-form">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="input-email-cpf">Email ou Cpf <span class="required">*</span></label>
                    <input type="text" class="form-control" id="input-email-cpf" placeholder="Insira seu email ou cpf:" required >
                </div>
                <div class="form-group col-md-6">
                    <label for="input-password">Senha <span class="required">*</span></label>
                    <input type="password" class="form-control" id="input-password" placeholder="Insira sua senha" required>
                </div>

            </div>


            <div class="form-group">
            </div>
            <p>Não possui uma conta? <span class="links"><a href="http://localhost:63342/Projetos%20com%20java/src/projeto_com_spring/demo/src/main/frontend/index.html?">Clique aqui</a></span></p>
            <button type="submit" class="btn btn-primary" id="login-btn">Login</button>
        </form>
    </div>

</main>
</body>
</html>
